name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download real Gradle wrapper
        run: |
          cd DualSubTV
          curl -L https://services.gradle.org/distributions/gradle-8.0-bin.zip -o gradle-bin.zip
          unzip -o gradle-bin.zip
          ./gradle-8.0/bin/gradle wrapper --gradle-version 8.0
          chmod +x gradlew

      - name: Build debug APK
        run: |
          cd DualSubTV
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DualSubTV-debug
          path: DualSubTV/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
